<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Altitude</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Georgia', serif; touch-action: none; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; z-index: 10;
  }
  #altitude-display {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.7); text-shadow: 0 0 10px rgba(255,255,255,0.3);
    transition: color 0.5s;
  }
  #zone-label {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-top: 4px;
    transition: opacity 0.5s;
  }
  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.35); pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.7} }
</style>
</head>
<body>
<div id="hud">
  <div id="altitude-display">0 m</div>
  <div id="zone-label">Ground Level</div>
</div>
<div id="hint">scroll or drag to ascend ↕</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ───────────────────────────────────────────────────────────────────
let altitude = 0;          // meters
let velocity = 0;          // m/frame
let time = 0;

// ─── ZONES ───────────────────────────────────────────────────────────────────
const ZONES = [
  { alt: 0,       label: 'Ground Level',        sky1: '#6baed6', sky2: '#c6e4f5', ground: true  },
  { alt: 300,     label: 'Low Altitude',         sky1: '#5a9fc8', sky2: '#a8d4ee', ground: false },
  { alt: 3000,    label: 'Bird Territory',       sky1: '#4a8ab5', sky2: '#7ec3e8', ground: false },
  { alt: 8000,    label: 'Hot Air Balloon Zone', sky1: '#3a74a0', sky2: '#5aaad4', ground: false },
  { alt: 18000,   label: 'Above the Clouds',     sky1: '#2a5f8a', sky2: '#3a85b8', ground: false },
  { alt: 32000,   label: 'Cruising Altitude',    sky1: '#1a3f65', sky2: '#2a60a0', ground: false },
  { alt: 80000,   label: 'Stratosphere',         sky1: '#0d2040', sky2: '#1a3060', ground: false },
  { alt: 200000,  label: 'Edge of Space',        sky1: '#050d1a', sky2: '#0a1830', ground: false },
  { alt: 400000,  label: 'Low Earth Orbit',      sky1: '#020810', sky2: '#050d20', ground: false },
  { alt: 800000,  label: 'Deep Space',           sky1: '#010305', sky2: '#020810', ground: false },
  { alt: 1500000, label: '👽  They\'re Here',    sky1: '#000205', sky2: '#010510', ground: false },
];

// ─── SEEDED RANDOM ────────────────────────────────────────────────────────────
function seededRand(seed) {
  let s = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return s - Math.floor(s);
}

// ─── ENTITY DEFINITIONS ──────────────────────────────────────────────────────
// Each entity type: { altMin, altMax, count, draw(ctx, x, y, t, seed) }

function drawBird(ctx, x, y, t, seed) {
  const flap = Math.sin(t * 0.08 + seed * 10) * 4;
  const scale = 0.6 + seededRand(seed * 3) * 0.8;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.strokeStyle = `rgba(30,20,10,${0.5 + seededRand(seed)*0.4})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, flap);
  ctx.quadraticCurveTo(0, -Math.abs(flap) - 2, 10, flap);
  ctx.stroke();
  ctx.restore();
}

function drawBirdFlock(ctx, x, y, t, seed) {
  for (let i = 0; i < 7; i++) {
    const ox = seededRand(seed + i * 7.3) * 60 - 30;
    const oy = seededRand(seed + i * 3.1) * 30 - 15;
    drawBird(ctx, x + ox, y + oy, t + i * 5, seed + i);
  }
}

function drawBalloon(ctx, x, y, t, seed) {
  const sway = Math.sin(t * 0.02 + seed) * 3;
  const colors = [
    ['#e74c3c','#c0392b'], ['#e67e22','#d35400'], ['#27ae60','#1e8449'],
    ['#8e44ad','#6c3483'], ['#f39c12','#d68910'], ['#16a085','#117a65']
  ];
  const ci = Math.floor(seededRand(seed * 11) * colors.length);
  const [c1, c2] = colors[ci];
  const scale = 0.7 + seededRand(seed * 5) * 0.6;
  ctx.save();
  ctx.translate(x + sway, y);
  ctx.scale(scale, scale);
  // balloon
  const grad = ctx.createRadialGradient(-8, -12, 2, 0, -5, 30);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, c1);
  grad.addColorStop(1, c2);
  ctx.beginPath();
  ctx.ellipse(0, -10, 22, 28, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // stripes
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  for (let s = -20; s < 25; s += 8) {
    ctx.beginPath();
    ctx.moveTo(s, -35);
    ctx.lineTo(s - 5, 18);
    ctx.stroke();
  }
  // basket lines
  ctx.strokeStyle = 'rgba(100,70,30,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-10, 18); ctx.lineTo(-6, 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, 18); ctx.lineTo(6, 30); ctx.stroke();
  // basket
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(-8, 30, 16, 10);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.strokeRect(-8, 30, 16, 10);
  ctx.restore();
}

function drawCloud(ctx, x, y, t, seed) {
  const scale = 0.8 + seededRand(seed * 7) * 1.4;
  const alpha = 0.7 + seededRand(seed * 3) * 0.25;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale * 0.6);
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  const blobs = [
    [0, 0, 35], [-30, 8, 25], [30, 8, 28], [-55, 15, 18], [55, 15, 18],
    [-15, -12, 22], [15, -10, 26]
  ];
  blobs.forEach(([bx, by, r]) => {
    const off = Math.floor(seededRand(seed + bx) * 10) - 5;
    ctx.beginPath();
    ctx.arc(bx + off, by, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

function drawPlane(ctx, x, y, t, seed) {
  const dir = seededRand(seed) > 0.5 ? 1 : -1;
  const px = x + ((t * 0.3 * dir + seed * 500) % (W + 300)) - 150;
  const scale = 0.7 + seededRand(seed * 2) * 0.5;
  ctx.save();
  ctx.translate(px, y);
  ctx.scale(dir * scale, scale);
  ctx.fillStyle = 'rgba(220,225,235,0.9)';
  // fuselage
  ctx.beginPath();
  ctx.ellipse(0, 0, 38, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // nose
  ctx.beginPath();
  ctx.moveTo(38, 0); ctx.lineTo(52, 2); ctx.lineTo(38, 4);
  ctx.fillStyle = 'rgba(180,190,210,0.9)';
  ctx.fill();
  // wings
  ctx.beginPath();
  ctx.moveTo(-5, 0); ctx.lineTo(-20, -32); ctx.lineTo(-30, -32); ctx.lineTo(-18, 0);
  ctx.fillStyle = 'rgba(200,210,225,0.85)';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-5, 0); ctx.lineTo(-20, 32); ctx.lineTo(-30, 32); ctx.lineTo(-18, 0);
  ctx.fill();
  // tail
  ctx.beginPath();
  ctx.moveTo(-30, 0); ctx.lineTo(-38, -14); ctx.lineTo(-42, -14); ctx.lineTo(-35, 0);
  ctx.fillStyle = 'rgba(180,190,210,0.9)';
  ctx.fill();
  // windows
  ctx.fillStyle = 'rgba(120,170,220,0.8)';
  for (let w = -15; w < 25; w += 7) {
    ctx.beginPath();
    ctx.ellipse(w, -1, 2.5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // contrail
  const grad = ctx.createLinearGradient(-50 * dir, 0, -120 * dir, 0);
  grad.addColorStop(0, 'rgba(255,255,255,0.4)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-50 * dir, -2, -70 * dir, 4);
  ctx.restore();
}

function drawSatellite(ctx, x, y, t, seed) {
  const angle = t * 0.01 + seed * 5;
  const orbitX = x + Math.cos(t * 0.005 + seed) * 80;
  const orbitY = y + Math.sin(t * 0.007 + seed) * 20;
  ctx.save();
  ctx.translate(orbitX, orbitY);
  ctx.rotate(angle);
  // body
  ctx.fillStyle = 'rgba(180,190,210,0.9)';
  ctx.fillRect(-15, -8, 30, 16);
  ctx.strokeStyle = 'rgba(100,120,150,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-15, -8, 30, 16);
  // solar panels
  ctx.fillStyle = 'rgba(30,60,140,0.85)';
  ctx.fillRect(-50, -5, 28, 10);
  ctx.fillRect(22, -5, 28, 10);
  // panel grid
  ctx.strokeStyle = 'rgba(60,100,200,0.4)';
  ctx.lineWidth = 0.5;
  for (let px = -50; px < -22; px += 7) {
    ctx.beginPath(); ctx.moveTo(px, -5); ctx.lineTo(px, 5); ctx.stroke();
  }
  for (let px = 22; px < 50; px += 7) {
    ctx.beginPath(); ctx.moveTo(px, -5); ctx.lineTo(px, 5); ctx.stroke();
  }
  // antenna
  ctx.strokeStyle = 'rgba(200,210,230,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, -20); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -20, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,210,230,0.8)';
  ctx.fill();
  ctx.restore();
}

function drawUFO(ctx, x, y, t, seed) {
  const hover = Math.sin(t * 0.03 + seed * 3) * 6;
  const pulse = 0.7 + Math.sin(t * 0.05 + seed) * 0.3;
  ctx.save();
  ctx.translate(x, y + hover);
  const scale = 0.8 + seededRand(seed * 2) * 0.7;
  ctx.scale(scale, scale);
  // glow beam
  const beamGrad = ctx.createRadialGradient(0, 20, 2, 0, 20, 60);
  beamGrad.addColorStop(0, `rgba(100,255,150,${0.15 * pulse})`);
  beamGrad.addColorStop(1, 'rgba(100,255,150,0)');
  ctx.beginPath();
  ctx.moveTo(-20, 10); ctx.lineTo(-50, 80); ctx.lineTo(50, 80); ctx.lineTo(20, 10);
  ctx.fillStyle = beamGrad;
  ctx.fill();
  // saucer bottom
  const bodyGrad = ctx.createLinearGradient(0, 5, 0, 18);
  bodyGrad.addColorStop(0, '#888');
  bodyGrad.addColorStop(1, '#444');
  ctx.beginPath();
  ctx.ellipse(0, 12, 50, 10, 0, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  // saucer dome
  const domeGrad = ctx.createRadialGradient(-10, -5, 2, 0, 0, 30);
  domeGrad.addColorStop(0, 'rgba(180,255,200,0.9)');
  domeGrad.addColorStop(0.5, 'rgba(80,200,120,0.8)');
  domeGrad.addColorStop(1, 'rgba(30,80,50,0.9)');
  ctx.beginPath();
  ctx.ellipse(0, 5, 30, 20, 0, 0, Math.PI * 2);
  ctx.fillStyle = domeGrad;
  ctx.fill();
  // lights
  const lightColors = ['#ff4444','#ffff44','#44ffff','#44ff44'];
  for (let l = 0; l < 6; l++) {
    const langle = (l / 6) * Math.PI * 2 + t * 0.04;
    const lx = Math.cos(langle) * 38;
    const ly = Math.sin(langle) * 6 + 12;
    const lc = lightColors[l % lightColors.length];
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI * 2);
    ctx.fillStyle = lc;
    ctx.shadowBlur = 8;
    ctx.shadowColor = lc;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawStar(ctx, x, y, brightness, size) {
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${brightness})`;
  ctx.fill();
}

// ─── STARS ────────────────────────────────────────────────────────────────────
const STARS = Array.from({length: 300}, (_, i) => ({
  x: seededRand(i * 17.3) * 2,
  y: seededRand(i * 31.7),
  size: 0.5 + seededRand(i * 7.1) * 1.5,
  twinkle: seededRand(i * 3.9) * Math.PI * 2,
}));

// ─── ENTITY LAYERS ────────────────────────────────────────────────────────────
const LAYERS = [
  { type: 'bird-flock', altMin: 200,   altMax: 9000,   count: 8,  drawFn: drawBirdFlock },
  { type: 'balloon',    altMin: 3000,  altMax: 14000,  count: 5,  drawFn: drawBalloon   },
  { type: 'cloud',      altMin: 5000,  altMax: 50000,  count: 12, drawFn: drawCloud     },
  { type: 'plane',      altMin: 28000, altMax: 50000,  count: 4,  drawFn: drawPlane     },
  { type: 'satellite',  altMin: 200000,altMax: 900000, count: 6,  drawFn: drawSatellite },
  { type: 'ufo',        altMin: 900000,altMax: 3000000,count: 5,  drawFn: drawUFO       },
];

// ─── SKY GRADIENT ─────────────────────────────────────────────────────────────
const SKY_STOPS = [
  { alt: 0,       top: '#87CEEB', bot: '#d4eef9' },
  { alt: 1000,    top: '#6ab0d8', bot: '#b0dcf0' },
  { alt: 5000,    top: '#4a8fc0', bot: '#80c0e8' },
  { alt: 15000,   top: '#2a6090', bot: '#4a90c8' },
  { alt: 30000,   top: '#12305a', bot: '#224080' },
  { alt: 60000,   top: '#061828', bot: '#102040' },
  { alt: 120000,  top: '#020810', bot: '#060e20' },
  { alt: 300000,  top: '#010508', bot: '#020a14' },
  { alt: 800000,  top: '#000305', bot: '#010508' },
  { alt: 2000000, top: '#000102', bot: '#000204' },
];

function lerpColor(c1, c2, t) {
  const p = (h) => parseInt(h.slice(1), 16);
  const r1 = (p(c1) >> 16) & 0xff, g1 = (p(c1) >> 8) & 0xff, b1 = p(c1) & 0xff;
  const r2 = (p(c2) >> 16) & 0xff, g2 = (p(c2) >> 8) & 0xff, b2 = p(c2) & 0xff;
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function getSkyColors(alt) {
  let i = 0;
  while (i < SKY_STOPS.length - 2 && alt > SKY_STOPS[i + 1].alt) i++;
  const s0 = SKY_STOPS[i], s1 = SKY_STOPS[i + 1];
  const t = Math.max(0, Math.min(1, (alt - s0.alt) / (s1.alt - s0.alt)));
  return {
    top: lerpColor(s0.top, s1.top, t),
    bot: lerpColor(s0.bot, s1.bot, t),
  };
}

// ─── ZONE LABEL ───────────────────────────────────────────────────────────────
function getCurrentZone(alt) {
  let z = ZONES[0];
  for (const zone of ZONES) { if (alt >= zone.alt) z = zone; }
  return z;
}

// ─── DRAW GROUND ──────────────────────────────────────────────────────────────
function drawGround(ctx, altitude) {
  if (altitude > 2000) return;
  const groundY = H * 0.75 + (altitude / 2000) * H * 0.5;
  // ground
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, '#5a8a3a');
  gGrad.addColorStop(0.1, '#4a7830');
  gGrad.addColorStop(0.4, '#8B6914');
  gGrad.addColorStop(1, '#5a4010');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, groundY, W, H - groundY);
  // trees silhouette
  if (altitude < 800) {
    const treeAlpha = Math.max(0, 1 - altitude / 800);
    ctx.fillStyle = `rgba(30,50,20,${treeAlpha})`;
    for (let tx = 0; tx < W + 60; tx += 45) {
      const th = 30 + seededRand(tx * 0.01) * 40;
      const tw = 18 + seededRand(tx * 0.02) * 12;
      ctx.beginPath();
      ctx.moveTo(tx - tw / 2, groundY);
      ctx.lineTo(tx, groundY - th);
      ctx.lineTo(tx + tw / 2, groundY);
      ctx.fill();
    }
  }
}

// ─── ATMOSPHERE HAZE ─────────────────────────────────────────────────────────
function drawHaze(ctx, altitude) {
  if (altitude < 5000 || altitude > 120000) return;
  const t = Math.min(1, (altitude - 5000) / 60000);
  const haze = t * 0.15;
  const hGrad = ctx.createLinearGradient(0, 0, 0, H);
  hGrad.addColorStop(0, `rgba(150,190,230,0)`);
  hGrad.addColorStop(0.5, `rgba(150,190,230,${haze})`);
  hGrad.addColorStop(1, `rgba(150,190,230,0)`);
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, W, H);
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  
  // sky
  const { top, bot } = getSkyColors(altitude);
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, top);
  skyGrad.addColorStop(1, bot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // stars (fade in from 60k)
  const starAlpha = Math.max(0, Math.min(1, (altitude - 60000) / 100000));
  if (starAlpha > 0) {
    STARS.forEach(s => {
      const twinkle = 0.5 + Math.sin(time * 0.03 + s.twinkle) * 0.3;
      const x = s.x * W;
      const y = s.y * H;
      // parallax scroll
      const parallaxY = ((y - altitude * 0.00005 * H) % H + H) % H;
      drawStar(ctx, x, parallaxY, starAlpha * twinkle, s.size);
    });
  }

  // atmosphere haze band
  drawHaze(ctx, altitude);

  // entities
  LAYERS.forEach(layer => {
    if (altitude < layer.altMin * 0.3 || altitude > layer.altMax * 3) return;
    const density = calcDensity(altitude, layer.altMin, layer.altMax);
    if (density <= 0) return;
    for (let i = 0; i < layer.count; i++) {
      const seed = i * 137.5 + layer.type.length * 17;
      const ex = seededRand(seed) * W;
      // vertical spread: entities distributed across the screen
      const ey = seededRand(seed + 1) * H * 0.7 + H * 0.1;
      ctx.globalAlpha = density * (0.7 + seededRand(seed + 5) * 0.3);
      layer.drawFn(ctx, ex, ey, time, seed);
    }
    ctx.globalAlpha = 1;
  });

  // ground
  drawGround(ctx, altitude);

  // aurora / space glow near atmosphere boundary
  if (altitude > 80000 && altitude < 400000) {
    const auroraT = Math.min(1, (altitude - 80000) / 200000);
    const aurGrad = ctx.createLinearGradient(0, H * 0.6, 0, H);
    aurGrad.addColorStop(0, `rgba(50,200,120,0)`);
    aurGrad.addColorStop(0.5, `rgba(50,200,120,${auroraT * 0.08})`);
    aurGrad.addColorStop(1, `rgba(20,100,200,${auroraT * 0.04})`);
    ctx.fillStyle = aurGrad;
    ctx.fillRect(0, 0, W, H);
  }
}

function calcDensity(alt, minAlt, maxAlt) {
  const fadeRange = (maxAlt - minAlt) * 0.2;
  if (alt < minAlt - fadeRange || alt > maxAlt + fadeRange) return 0;
  let d = 1;
  if (alt < minAlt) d = Math.max(0, (alt - (minAlt - fadeRange)) / fadeRange);
  if (alt > maxAlt) d = Math.max(0, 1 - (alt - maxAlt) / fadeRange);
  return d;
}

// ─── HUD UPDATE ───────────────────────────────────────────────────────────────
const hudAlt = document.getElementById('altitude-display');
const hudZone = document.getElementById('zone-label');
const hint = document.getElementById('hint');
let hintHidden = false;

function updateHUD() {
  const displayAlt = altitude < 1000
    ? `${Math.round(altitude)} m`
    : altitude < 1000000
      ? `${(altitude / 1000).toFixed(1)} km`
      : `${(altitude / 1000000).toFixed(2)} Mm`;
  hudAlt.textContent = displayAlt;
  const zone = getCurrentZone(altitude);
  hudZone.textContent = zone.label;
  // color shift for space
  const spaceT = Math.min(1, altitude / 200000);
  const textBrightness = Math.round(150 + (1 - spaceT) * 100);
  hudAlt.style.color = `rgba(${textBrightness},${textBrightness},${textBrightness},0.8)`;
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
let lastTouchY = null;

window.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY;
  const scrollSpeed = 1 + altitude * 0.000015;
  velocity += delta * scrollSpeed * 0.4;
  if (!hintHidden) { hint.style.opacity = '0'; hintHidden = true; }
}, { passive: false });

window.addEventListener('touchstart', e => {
  lastTouchY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchmove', e => {
  e.preventDefault();
  const dy = lastTouchY - e.touches[0].clientY;
  lastTouchY = e.touches[0].clientY;
  const scrollSpeed = 1 + altitude * 0.000015;
  velocity += dy * scrollSpeed * 0.8;
  if (!hintHidden) { hint.style.opacity = '0'; hintHidden = true; }
}, { passive: false });

window.addEventListener('touchend', () => { lastTouchY = null; });

// keyboard
window.addEventListener('keydown', e => {
  const scrollSpeed = 1 + altitude * 0.000015;
  if (e.key === 'ArrowUp' || e.key === 'w') velocity -= 30 * scrollSpeed;
  if (e.key === 'ArrowDown' || e.key === 's') velocity += 30 * scrollSpeed;
});

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop() {
  time++;
  // physics
  altitude = Math.max(0, altitude + velocity);
  velocity *= 0.88; // friction/damping
  if (Math.abs(velocity) < 0.1) velocity = 0;
  
  render();
  updateHUD();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
